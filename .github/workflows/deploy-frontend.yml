name: Deploy Frontend To S3

on:
  workflow_dispatch:
  push:
    branches: [gyugo]
    paths:
      - "front/**"
      - ".github/workflows/deploy-frontend.yml"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  AWS_ACCOUNT_ID: "489535778783"
  AWS_FRONTEND_DEPLOY_ROLE_ARN: arn:aws:iam::489535778783:role/NammanmuGithubOidcTrustPolicy
  FRONTEND_BUCKET: nammamnu-front-dev-489535778783-489535778783-ap-northeast-2-an
  CLOUDFRONT_DISTRIBUTION_ID: E28MTZRA3F0726
  FRONTEND_BUILD_DIR: front/dist
  VITE_BACKEND_ORIGIN: ${{ vars.VITE_BACKEND_ORIGIN }}
  VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}

jobs:
  deploy-front:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_FRONTEND_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        working-directory: front
        run: npm ci

      - name: Lint frontend
        working-directory: front
        run: npm run lint

      - name: Build frontend
        working-directory: front
        run: npm run build

      - name: Upload static assets to S3
        run: |
          aws s3 sync "$FRONTEND_BUILD_DIR" "s3://$FRONTEND_BUCKET" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html to S3
        run: |
          aws s3 cp "$FRONTEND_BUILD_DIR/index.html" "s3://$FRONTEND_BUCKET" \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
