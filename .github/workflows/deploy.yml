name: Deploy Backend To ECS

on:
  workflow_dispatch:
  push:
    branches: [gyugo]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  AWS_ACCOUNT_ID: "489535778783"
  ECR_REPOSITORY: nammanmu/gyugo/backend

  ECS_CLUSTER: nammanmu-dev
  ECS_SERVICE: nammanmu-gyugo-backend
  ECS_TASK_DEFINITION: nammanmu-dev-nammanmu-gyugo-backend
  CONTAINER_NAME: backend

  # Set to an ALB endpoint such as http://example-alb/api/status to enable smoke tests.
  HEALTH_CHECK_URL: ""

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::489535778783:role/NammanmuGithubOidcTrustPolicy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        id: build-image
        run: |
          IMAGE_URI=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${GITHUB_SHA}
          docker build -t "$IMAGE_URI" ./backend
          docker push "$IMAGE_URI"
          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_DEFINITION" \
            --query taskDefinition \
            > task-definition.json

      - name: Render new ECS task definition
        id: render-task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-definition.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Smoke test
        run: |
          if [ -z "$HEALTH_CHECK_URL" ]; then
            echo "HEALTH_CHECK_URL is empty. Skipping smoke test."
            exit 0
          fi

          curl --fail --silent --show-error \
            --retry 12 \
            --retry-all-errors \
            --retry-delay 10 \
            "$HEALTH_CHECK_URL"
