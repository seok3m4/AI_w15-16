name: CI

on:
  push:
    branches: [gyugo]
  pull_request:
    branches: [gyugo]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Run backend tests
        working-directory: backend
        run: ./mvnw test

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        working-directory: front
        run: npm ci

      - name: Lint frontend
        working-directory: front
        run: npm run lint

      - name: Build frontend
        working-directory: front
        run: npm run build

  agent-worker-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: agent-worker/requirements.txt

      - name: Install agent-worker dependencies
        working-directory: agent-worker
        run: python -m pip install -r requirements.txt

      - name: Run agent-worker tests
        working-directory: agent-worker
        run: python -m pytest tests