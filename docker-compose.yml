services:
  postgres:
    image: postgres:16-alpine
    container_name: week15-board-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-board}
      POSTGRES_USER: ${POSTGRES_USER:-board}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-board}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-board} -d ${POSTGRES_DB:-board}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

