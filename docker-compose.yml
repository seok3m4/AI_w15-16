services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-memento}
      POSTGRES_USER: ${POSTGRES_USER:-memento}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-memento_local_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-memento} -d ${POSTGRES_DB:-memento}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/memento}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-memento}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-memento_local_password}
      AI_SERVER_URL: ${AI_SERVER_URL:-http://ai-server:8000}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-local-dev-only-change-me}
      REFRESH_TOKEN_PEPPER: ${REFRESH_TOKEN_PEPPER:-local-dev-only-change-me}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      ai-server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ai-server:
    build:
      context: ./ai-server
    environment:
      AI_PROFILE: ${AI_PROFILE:-local}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
