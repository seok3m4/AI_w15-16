server:
  port: 8080

spring:
  application:
    name: week15-board
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/board}
    username: ${SPRING_DATASOURCE_USERNAME:board}
    password: ${SPRING_DATASOURCE_PASSWORD:board}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Seoul

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins:
      - http://localhost:5173
  ai:
    enabled: false
    rag:
      top-k: 5
      embedding-model: ""
      vector-store: ""
    agent:
      provider: ""
      model: ""
    mcp:
      servers: []

