spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/memento}
    username: ${DATABASE_USERNAME:${POSTGRES_USER:memento}}
    password: ${DATABASE_PASSWORD:${POSTGRES_PASSWORD:memento_local_password}}
  flyway:
    enabled: true
    locations: classpath:db/migration

memento:
  jobs:
    worker:
      enabled: ${ASYNC_JOB_WORKER_ENABLED:true}
      poll-interval: ${ASYNC_JOB_WORKER_POLL_INTERVAL:5s}
      stale-timeout: ${ASYNC_JOB_STALE_TIMEOUT:60s}
      claim-limit: ${ASYNC_JOB_CLAIM_LIMIT:1}
      default-max-attempts: ${ASYNC_JOB_DEFAULT_MAX_ATTEMPTS:3}
  embedding:
    base-url: ${AI_SERVER_URL:http://ai-server:8000}
    provider: ${AI_PROVIDER:mock}
    model: ${AI_EMBEDDING_MODEL:text-embedding-3-small}
    dimension: ${AI_EMBEDDING_DIMENSION:1536}
    connect-timeout: ${AI_EMBEDDING_CONNECT_TIMEOUT:2s}
    read-timeout: ${AI_EMBEDDING_READ_TIMEOUT:15s}
  capsule:
    base-url: ${AI_SERVER_URL:http://ai-server:8000}
  summary:
    base-url: ${AI_SERVER_URL:http://ai-server:8000}
    connect-timeout: ${AI_SUMMARY_CONNECT_TIMEOUT:2s}
    read-timeout: ${AI_SUMMARY_READ_TIMEOUT:15s}
  agent:
    base-url: ${AI_SERVER_URL:http://ai-server:8000}
    connect-timeout: ${AI_AGENT_CONNECT_TIMEOUT:2s}
    read-timeout: ${AI_AGENT_READ_TIMEOUT:60s}
  auth:
    email-encryption-key-base64: ${EMAIL_ENCRYPTION_KEY_BASE64}
    email-encryption-key-id: ${EMAIL_ENCRYPTION_KEY_ID}
    email-lookup-pepper-base64: ${EMAIL_LOOKUP_PEPPER_BASE64}
    jwt-signing-key: ${JWT_SIGNING_KEY}
    refresh-token-pepper: ${REFRESH_TOKEN_PEPPER}
    access-token-ttl-seconds: ${ACCESS_TOKEN_TTL_SECONDS:3600}
    refresh-token-ttl-seconds: ${REFRESH_TOKEN_TTL_SECONDS:1209600}
  mcp:
    token-pepper: ${MCP_TOKEN_PEPPER}
    local-encryption-key-base64: ${MCP_LOCAL_ENCRYPTION_KEY_BASE64}
    local-encryption-key-id: ${MCP_LOCAL_ENCRYPTION_KEY_ID}
