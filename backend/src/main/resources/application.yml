spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/memento}
    username: ${DATABASE_USERNAME:${POSTGRES_USER:memento}}
    password: ${DATABASE_PASSWORD:${POSTGRES_PASSWORD:memento_local_password}}
  flyway:
    enabled: true
    locations: classpath:db/migration

memento:
  auth:
    email-encryption-key-base64: ${EMAIL_ENCRYPTION_KEY_BASE64:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
    email-encryption-key-id: ${EMAIL_ENCRYPTION_KEY_ID:local-dev-key}
    email-lookup-pepper-base64: ${EMAIL_LOOKUP_PEPPER_BASE64:bG9jYWwtbG9va3VwLXBlcHBlcg==}
