<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Jungle Camp Login</title>
	<link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="auth-page">
	<main class="login-shell" aria-label="Jungle Camp Login">
		<section class="login-panel">
			<div class="brand-mark" aria-hidden="true">JC</div>
			<h1>Jungle Camp Login</h1>
			<p class="lead">Google 계정으로 로그인해 개인화된 미국경제 대시보드를 저장하세요.</p>

			<p class="notice error" th:if="${hasError}">로그인 정보를 다시 확인해 주세요.</p>
			<p class="notice success" th:if="${hasLogout}">로그아웃되었습니다.</p>

			<a class="oauth-button" th:href="@{/oauth2/authorization/google}">Google로 계속하기</a>

			<form class="login-form" th:action="@{/login}" method="post">
				<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

				<label for="username">아이디</label>
				<input id="username" name="username" type="text" placeholder="user" autocomplete="username" required autofocus>

				<label for="password">비밀번호</label>
				<input id="password" name="password" type="password" placeholder="password" autocomplete="current-password" required>

				<button type="submit">테스트 로그인</button>
			</form>

			<p class="hint">로컬 테스트 계정: <strong>user</strong> / <strong>password</strong></p>
		</section>
	</main>
</body>
</html>
