spring.datasource.url=jdbc:h2:mem:jungle_ai_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false
app.economy.sync.enabled=false
app.economy.bls.api-key=
app.economy.bea.api-key=
app.economy.alpha-vantage.api-key=
app.economy.eia.api-key=
app.economy.koreaexim.enabled=false
app.economy.koreaexim.api-key=
app.agents.enabled=true
app.agents.worker-url=http://localhost:8090
app.agents.worker-token=test-agent-token
app.agents.model=test-agent-model
app.rag.embedding-model=test-embedding-model
app.auth.jwt.secret=test-local-secret-change-me-32-bytes-minimum
app.auth.jwt.access-ttl-seconds=900
app.auth.jwt.refresh-ttl-seconds=1209600
app.auth.jwt.cookie-secure=false
app.auth.admin.bootstrap-emails=admin@example.com
app.auth.rate-limit.enabled=true
app.auth.captcha.enabled=true
app.auth.admin-mfa.enabled=true
app.data.encryption-key=test-data-encryption-key-change-me
spring.security.oauth2.client.registration.google.client-id=test-google-client
spring.security.oauth2.client.registration.google.client-secret=test-google-secret
spring.security.oauth2.client.registration.google.scope=openid,email,profile
