spring.application.name=backend
spring.config.import=optional:file:.env.local[.properties],optional:file:../.env.local[.properties]
server.forward-headers-strategy=framework
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/jungle_ai}
spring.datasource.username=${DB_USERNAME:jungle}
spring.datasource.password=${DB_PASSWORD:jungle}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
app.frontend.board-url=${FRONTEND_BOARD_URL:http://localhost:5173/home}
app.economy.fred.api-key=${FRED_API_KEY:}
app.economy.bls.api-key=${BLS_API_KEY:}
app.economy.bea.api-key=${BEA_API_KEY:}
app.economy.alpha-vantage.api-key=${ALPHA_VANTAGE_API_KEY:}
app.economy.eia.api-key=${EIA_API_KEY:}
app.economy.koreaexim.api-key=${KOREAEXIM_API_KEY:}
app.economy.koreaexim.enabled=${KOREAEXIM_EXCHANGE_ENABLED:true}
app.economy.koreaexim.fixed-rate-ms=${KOREAEXIM_EXCHANGE_FIXED_RATE_MS:300000}
app.economy.koreaexim.stale-after-minutes=${KOREAEXIM_EXCHANGE_STALE_AFTER_MINUTES:55}
app.economy.koreaexim.business-day-cron=${KOREAEXIM_EXCHANGE_BUSINESS_DAY_CRON:0 10 11 * * MON-FRI}
app.economy.openai.api-key=${OPENAI_API_KEY:}
app.economy.openai.model=${OPENAI_BRIEF_MODEL:gpt-5.5}
app.rag.embedding-model=${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
app.economy.sync.fixed-rate-ms=${ECON_SYNC_FIXED_RATE_MS:14400000}
app.economy.sync.stale-after-minutes=${ECON_STALE_AFTER_MINUTES:240}
app.economy.sync.enabled=${ECON_SYNC_ENABLED:true}
app.economy.sync.daily-limit=${ECON_SYNC_DAILY_LIMIT:20}
app.agents.enabled=${US_ECON_AGENTS_ENABLED:true}
app.agents.worker-url=${AGENT_WORKER_URL:http://localhost:8090}
app.agents.worker-token=${AGENT_WORKER_TOKEN:local-agent-token}
app.agents.model=${OPENAI_AGENT_MODEL:gpt-5.5}
app.auth.jwt.secret=${JWT_SECRET:local-dev-secret-change-me-32-bytes-minimum}
app.auth.jwt.access-ttl-seconds=${JWT_ACCESS_TTL_SECONDS:900}
app.auth.jwt.refresh-ttl-seconds=${JWT_REFRESH_TTL_SECONDS:1209600}
app.auth.jwt.cookie-secure=${JWT_COOKIE_SECURE:false}
app.auth.email.from=${SMTP_FROM:no-reply@localhost}
app.auth.email.verification-ttl-minutes=${EMAIL_VERIFICATION_TTL_MINUTES:30}
app.auth.admin.bootstrap-emails=${ADMIN_BOOTSTRAP_EMAILS:}
app.auth.rate-limit.enabled=${AUTH_RATE_LIMIT_ENABLED:true}
app.auth.captcha.enabled=${AUTH_CAPTCHA_ENABLED:true}
app.auth.captcha.turnstile-secret=${TURNSTILE_SECRET_KEY:}
app.auth.admin-mfa.enabled=${AUTH_ADMIN_MFA_ENABLED:true}
app.data.encryption-key=${APP_DATA_ENCRYPTION_KEY:local-dev-data-encryption-key-change-me}
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:5173}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS_ENABLE:true}
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:google-client-id-missing}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google-client-secret-missing}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/{registrationId}}
