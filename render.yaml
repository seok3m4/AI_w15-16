services:
  - type: web
    runtime: node
    name: ai-w15-16-board-api
    plan: free
    region: singapore
    buildCommand: npm ci && npm run build -w mcp-server && npm run prisma:generate -w api && npm run build -w api
    startCommand: cd apps/api && npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: DATABASE_URL
        fromDatabase:
          name: ai-w15-16-board-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://ai-w15-16-board-web.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    runtime: static
    name: ai-w15-16-board-web
    buildCommand: npm ci && npm run build -w web
    staticPublishPath: apps/web/dist
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 24.14.1
      - key: VITE_API_BASE_URL
        value: https://ai-w15-16-board-api.onrender.com
      - key: VITE_KAKAO_MAP_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: ai-w15-16-board-db
    plan: free
    region: singapore
    postgresMajorVersion: "16"
    databaseName: cine_review_ai
    user: cine
